<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 420" role="img" aria-label="AI-medewerker chat interface mockup">
  <!-- Background blobs -->
  <ellipse cx="240" cy="380" rx="200" ry="14" fill="#1A1A1A" opacity="0.08"/>
  <ellipse cx="120" cy="100" rx="100" ry="100" fill="#52B788" opacity="0.10"/>

  <!-- Chat window -->
  <g transform="translate(60 40)">
    <rect width="360" height="340" rx="16" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>

    <!-- Header -->
    <rect x="0" y="0" width="360" height="56" rx="16" fill="#FAFAF5"/>
    <rect x="0" y="40" width="360" height="16" fill="#FAFAF5"/>
    <line x1="0" y1="56" x2="360" y2="56" stroke="#E0E0E0" stroke-width="1"/>
    <!-- Bot avatar -->
    <rect x="16" y="14" width="28" height="28" rx="8" fill="#1A1A1A"/>
    <text x="30" y="33" text-anchor="middle" font-family="Montserrat, sans-serif" font-size="14" font-weight="800" fill="#FFFFFF">F</text>
    <text x="40" y="33" text-anchor="middle" font-family="Montserrat, sans-serif" font-size="10" font-weight="800" fill="#E89940">n</text>
    <!-- Header text -->
    <text x="56" y="26" font-family="Montserrat, sans-serif" font-size="12" font-weight="700" fill="#1A1A1A">Flonam AI</text>
    <text x="56" y="40" font-family="Montserrat, sans-serif" font-size="9" fill="#6B6B6B">Online · leert van jouw stijl</text>
    <!-- Status dot -->
    <circle cx="340" cy="28" r="5" fill="#52B788"/>

    <!-- Bot message 1 -->
    <g transform="translate(16 72)">
      <rect width="220" height="44" rx="14" fill="#F0F7F2"/>
      <rect width="14" height="44" rx="7" fill="#F0F7F2"/>
      <rect x="14" y="34" width="14" height="10" rx="3" fill="#F0F7F2"/>
      <rect x="14" y="14" width="180" height="4" rx="2" fill="#1B4332"/>
      <rect x="14" y="24" width="150" height="4" rx="2" fill="#1B4332" opacity="0.7"/>
    </g>

    <!-- User message -->
    <g transform="translate(180 128)">
      <rect width="160" height="34" rx="14" fill="#1B4332"/>
      <rect x="146" y="24" width="14" height="10" rx="3" fill="#1B4332"/>
      <rect x="14" y="14" width="120" height="4" rx="2" fill="#FFFFFF" opacity="0.85"/>
    </g>

    <!-- Bot message 2 with suggestions -->
    <g transform="translate(16 172)">
      <rect width="280" height="56" rx="14" fill="#F0F7F2"/>
      <rect x="14" y="14" width="220" height="4" rx="2" fill="#1B4332"/>
      <rect x="14" y="24" width="180" height="4" rx="2" fill="#1B4332" opacity="0.7"/>
      <rect x="14" y="34" width="140" height="4" rx="2" fill="#1B4332" opacity="0.5"/>
    </g>

    <!-- Action chips -->
    <g transform="translate(16 238)">
      <rect width="92" height="26" rx="13" fill="#FFFFFF" stroke="#1B4332" stroke-width="1.5"/>
      <text x="46" y="17" text-anchor="middle" font-family="Montserrat, sans-serif" font-size="9" font-weight="700" fill="#1B4332">Plan in agenda</text>
    </g>
    <g transform="translate(116 238)">
      <rect width="92" height="26" rx="13" fill="#FFFFFF" stroke="#1B4332" stroke-width="1.5"/>
      <text x="46" y="17" text-anchor="middle" font-family="Montserrat, sans-serif" font-size="9" font-weight="700" fill="#1B4332">Stuur als mail</text>
    </g>
    <g transform="translate(216 238)">
      <rect width="68" height="26" rx="13" fill="#E89940"/>
      <text x="34" y="17" text-anchor="middle" font-family="Montserrat, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF">Akkoord</text>
    </g>

    <!-- Input field -->
    <rect x="16" y="282" width="328" height="40" rx="20" fill="#FAFAF5" stroke="#E0E0E0" stroke-width="1"/>
    <text x="32" y="306" font-family="Montserrat, sans-serif" font-size="11" fill="#6B6B6B">Stel een vraag…</text>
    <circle cx="324" cy="302" r="14" fill="#1B4332"/>
    <path d="M 320 302 L 328 302 M 325 299 L 328 302 L 325 305" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
