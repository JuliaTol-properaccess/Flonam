    <text x="296" y="276" text-anchor="end" font-family="Montserrat, sans-serif" font-size="11" font-weight="600" fill="#1A1A1A">€ 2.450,00</text>
    <text x="180" y="292" font-family="Montserrat, sans-serif" font-size="10" fill="#6B6B6B">BTW 21%</text>
