    <rect x="24" y="174" width="180" height="5" rx="2" fill="#E0E0E0"/>
    <text x="296" y="180" text-anchor="end" font-family="Montserrat, sans-serif" font-size="11" font-weight="600" fill="#1A1A1A">€   850,00</text>

