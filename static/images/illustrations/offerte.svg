    <text x="296" y="240" text-anchor="end" font-family="Montserrat, sans-serif" font-size="11" font-weight="600" fill="#1A1A1A">€   200,00</text>

    <line x1="24" y1="256" x2="296" y2="256" stroke="#E0E0E0" stroke-width="1"/>

