    <text x="24" y="94" font-family="Montserrat, sans-serif" font-size="9" font-weight="700" fill="#6B6B6B">AAN</text>
    <text x="24" y="110" font-family="Montserrat, sans-serif" font-size="11" font-weight="700" fill="#1A1A1A">Jansen Bouwadvies</text>
    <text x="24" y="125" font-family="Montserrat, sans-serif" font-size="9" fill="#6B6B6B">info@jansenbouw.nl</text>

