    <text x="296" y="200" text-anchor="end" font-family="Montserrat, sans-serif" font-size="11" font-weight="600" fill="#1A1A1A">€   420,00</text>

    <rect x="24" y="214" width="170" height="5" rx="2" fill="#E0E0E0"/>
    <text x="296" y="220" text-anchor="end" font-family="Montserrat, sans-serif" font-size="11" font-weight="600" fill="#1A1A1A">€   980,00</text>

