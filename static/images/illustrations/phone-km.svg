<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 420" role="img" aria-label="Kilometer-registratie app mockup">
  <!-- Soft background blobs -->
  <ellipse cx="240" cy="380" rx="180" ry="14" fill="#1A1A1A" opacity="0.08"/>
  <ellipse cx="120" cy="120" rx="120" ry="120" fill="#E89940" opacity="0.10"/>
  <ellipse cx="380" cy="280" rx="100" ry="100" fill="#52B788" opacity="0.10"/>

  <!-- Phone frame -->
  <g transform="translate(160 30)">
    <rect width="160" height="340" rx="30" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="2"/>
    <rect x="10" y="10" width="140" height="320" rx="22" fill="#0F2922"/>

    <!-- Status bar dots (camera notch hint) -->
    <circle cx="80" cy="22" r="3" fill="#1B4332"/>

    <!-- Header -->
    <text x="24" y="48" font-family="Montserrat, sans-serif" font-size="9" font-weight="700" fill="#52B788">KILOMETERS</text>

    <!-- Big counter -->
    <text x="24" y="92" font-family="Montserrat, sans-serif" font-size="38" font-weight="800" fill="#FFFFFF">142,8</text>
    <text x="24" y="108" font-family="Montserrat, sans-serif" font-size="9" fill="#52B788">km deze week</text>

    <!-- Map area -->
    <rect x="20" y="124" width="120" height="80" rx="10" fill="#14352B"/>
    <!-- Route path -->
    <path d="M 30 188 Q 50 150 70 168 T 130 138" stroke="#52B788" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="30" cy="188" r="4" fill="#E89940"/>
    <circle cx="130" cy="138" r="4" fill="#E89940"/>
    <!-- Subtle grid hint -->
    <line x1="20" y1="160" x2="140" y2="160" stroke="#FFFFFF" stroke-width="0.5" opacity="0.1"/>
    <line x1="80" y1="124" x2="80" y2="204" stroke="#FFFFFF" stroke-width="0.5" opacity="0.1"/>

    <!-- Trip list -->
    <text x="24" y="226" font-family="Montserrat, sans-serif" font-size="8" font-weight="700" fill="#52B788">VANDAAG</text>

    <!-- Trip item 1 -->
    <circle cx="28" cy="244" r="3" fill="#52B788"/>
    <rect x="38" y="240" width="80" height="4" rx="2" fill="#FFFFFF" opacity="0.85"/>
    <text x="138" y="246" text-anchor="end" font-family="Montserrat, sans-serif" font-size="8" font-weight="600" fill="#52B788">28 km</text>

    <!-- Trip item 2 -->
    <circle cx="28" cy="262" r="3" fill="#52B788"/>
    <rect x="38" y="258" width="60" height="4" rx="2" fill="#FFFFFF" opacity="0.7"/>
    <text x="138" y="264" text-anchor="end" font-family="Montserrat, sans-serif" font-size="8" font-weight="600" fill="#52B788">12 km</text>

    <!-- Trip item 3 -->
    <circle cx="28" cy="280" r="3" fill="#E89940"/>
    <rect x="38" y="276" width="70" height="4" rx="2" fill="#FFFFFF" opacity="0.5"/>
    <text x="138" y="282" text-anchor="end" font-family="Montserrat, sans-serif" font-size="8" font-weight="600" fill="#E89940">privé</text>

    <!-- Big record button -->
    <circle cx="80" cy="310" r="14" fill="#E89940"/>
    <circle cx="80" cy="310" r="6" fill="#FFFFFF"/>
  </g>

  <!-- Side floating label -->
  <g transform="translate(40 200)">
    <rect width="100" height="44" rx="22" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>
    <circle cx="22" cy="22" r="6" fill="#52B788"/>
    <text x="36" y="20" font-family="Montserrat, sans-serif" font-size="8" font-weight="700" fill="#1A1A1A">Auto-detect</text>
    <text x="36" y="32" font-family="Montserrat, sans-serif" font-size="7" fill="#6B6B6B">Aan</text>
  </g>
</svg>
