<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 420" role="img" aria-label="Dashboard mockup">
  <!-- Background blobs -->
  <ellipse cx="240" cy="380" rx="220" ry="14" fill="#1A1A1A" opacity="0.08"/>
  <ellipse cx="380" cy="100" rx="120" ry="120" fill="#52B788" opacity="0.10"/>
  <ellipse cx="100" cy="280" rx="100" ry="100" fill="#E89940" opacity="0.10"/>

  <!-- Dashboard window -->
  <g transform="translate(40 40)">
    <rect width="400" height="340" rx="14" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>

    <!-- Top bar (window chrome) -->
    <rect x="0" y="0" width="400" height="34" rx="14" fill="#FAFAF5"/>
    <rect x="0" y="20" width="400" height="14" fill="#FAFAF5"/>
    <line x1="0" y1="34" x2="400" y2="34" stroke="#E0E0E0" stroke-width="1"/>
    <circle cx="16" cy="17" r="4" fill="#E89940"/>
    <circle cx="30" cy="17" r="4" fill="#52B788"/>
    <circle cx="44" cy="17" r="4" fill="#E0E0E0"/>

    <!-- Title -->
    <text x="24" y="62" font-family="Montserrat, sans-serif" font-size="14" font-weight="800" fill="#1A1A1A">Overzicht — Mei 2026</text>
    <text x="24" y="78" font-family="Montserrat, sans-serif" font-size="9" fill="#6B6B6B">Realtime · laatste update zojuist</text>

    <!-- KPI tiles -->
    <g transform="translate(24 94)">
      <rect width="112" height="68" rx="10" fill="#F0F7F2"/>
      <text x="14" y="22" font-family="Montserrat, sans-serif" font-size="8" font-weight="700" fill="#1B4332" opacity="0.6">OMZET</text>
      <text x="14" y="46" font-family="Montserrat, sans-serif" font-size="22" font-weight="800" fill="#1B4332">€42k</text>
      <text x="14" y="60" font-family="Montserrat, sans-serif" font-size="8" font-weight="600" fill="#52B788">+12%</text>
    </g>
    <g transform="translate(144 94)">
      <rect width="112" height="68" rx="10" fill="#F0F7F2"/>
      <text x="14" y="22" font-family="Montserrat, sans-serif" font-size="8" font-weight="700" fill="#1B4332" opacity="0.6">KLANTEN</text>
      <text x="14" y="46" font-family="Montserrat, sans-serif" font-size="22" font-weight="800" fill="#1B4332">128</text>
      <text x="14" y="60" font-family="Montserrat, sans-serif" font-size="8" font-weight="600" fill="#52B788">+8</text>
    </g>
    <g transform="translate(264 94)">
      <rect width="112" height="68" rx="10" fill="#FEF3C7"/>
      <text x="14" y="22" font-family="Montserrat, sans-serif" font-size="8" font-weight="700" fill="#B45309">GROEI</text>
      <text x="14" y="46" font-family="Montserrat, sans-serif" font-size="22" font-weight="800" fill="#E89940">+18%</text>
      <text x="14" y="60" font-family="Montserrat, sans-serif" font-size="8" font-weight="600" fill="#B45309">YoY</text>
    </g>

    <!-- Chart -->
    <g transform="translate(24 178)">
      <rect width="232" height="138" rx="10" fill="#FAFAF5"/>
      <text x="14" y="22" font-family="Montserrat, sans-serif" font-size="9" font-weight="700" fill="#6B6B6B">OMZET PER WEEK</text>
      <!-- Y-axis grid -->
      <line x1="14" y1="50" x2="220" y2="50" stroke="#E0E0E0" stroke-width="0.5"/>
      <line x1="14" y1="80" x2="220" y2="80" stroke="#E0E0E0" stroke-width="0.5"/>
      <line x1="14" y1="110" x2="220" y2="110" stroke="#E0E0E0" stroke-width="0.5"/>
      <!-- Bars -->
      <rect x="22" y="92" width="16" height="22" rx="2" fill="#52B788"/>
      <rect x="44" y="78" width="16" height="36" rx="2" fill="#52B788"/>
      <rect x="66" y="84" width="16" height="30" rx="2" fill="#52B788"/>
      <rect x="88" y="62" width="16" height="52" rx="2" fill="#1B4332"/>
      <rect x="110" y="70" width="16" height="44" rx="2" fill="#52B788"/>
      <rect x="132" y="58" width="16" height="56" rx="2" fill="#1B4332"/>
      <rect x="154" y="66" width="16" height="48" rx="2" fill="#52B788"/>
      <rect x="176" y="50" width="16" height="64" rx="2" fill="#1B4332"/>
      <rect x="198" y="42" width="16" height="72" rx="2" fill="#E89940"/>
    </g>

    <!-- Right panel: activity list -->
    <g transform="translate(264 178)">
      <rect width="112" height="138" rx="10" fill="#FAFAF5"/>
      <text x="14" y="22" font-family="Montserrat, sans-serif" font-size="9" font-weight="700" fill="#6B6B6B">ACTIVITEIT</text>

      <circle cx="20" cy="42" r="3" fill="#52B788"/>
      <rect x="28" y="38" width="70" height="3" rx="1" fill="#1A1A1A"/>
      <rect x="28" y="44" width="50" height="3" rx="1" fill="#6B6B6B"/>

      <circle cx="20" cy="64" r="3" fill="#52B788"/>
      <rect x="28" y="60" width="60" height="3" rx="1" fill="#1A1A1A"/>
      <rect x="28" y="66" width="46" height="3" rx="1" fill="#6B6B6B"/>

      <circle cx="20" cy="86" r="3" fill="#E89940"/>
      <rect x="28" y="82" width="74" height="3" rx="1" fill="#1A1A1A"/>
      <rect x="28" y="88" width="40" height="3" rx="1" fill="#6B6B6B"/>

      <circle cx="20" cy="108" r="3" fill="#52B788"/>
      <rect x="28" y="104" width="56" height="3" rx="1" fill="#1A1A1A"/>
      <rect x="28" y="110" width="36" height="3" rx="1" fill="#6B6B6B"/>

      <circle cx="20" cy="130" r="3" fill="#E0E0E0"/>
      <rect x="28" y="126" width="50" height="3" rx="1" fill="#1A1A1A" opacity="0.6"/>
    </g>
  </g>
</svg>
