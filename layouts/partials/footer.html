<footer class="border-t border-slate-200 bg-surface mt-16">
  <div class="container-wide py-10 grid gap-8 sm:grid-cols-2 lg:grid-cols-3">
    <div>
      <div class="font-display text-lg font-extrabold text-ink">{{ .Site.Title }}</div>
      <p class="mt-2 text-sm text-muted">{{ .Site.Params.description }}</p>
    </div>
    <div>
      <h2 class="text-sm font-semibold text-ink">Navigatie</h2>
      <ul class="mt-3 space-y-2 text-sm">
        {{ range .Site.Menus.main }}
          <li><a href="{{ .URL | relLangURL }}" class="text-muted hover:text-brand">{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </div>
    <div>
      <h2 class="text-sm font-semibold text-ink">Contact</h2>
      <ul class="mt-3 space-y-2 text-sm text-muted">
        {{ with .Site.Params.contact.email }}
          <li><a href="mailto:{{ . }}" class="hover:text-brand">{{ . }}</a></li>
        {{ end }}
      </ul>
    </div>
  </div>
  <div class="border-t border-slate-200">
    <div class="container-wide py-4 text-xs text-muted">
      &copy; {{ now.Year }} {{ .Site.Title }}. Alle rechten voorbehouden.
    </div>
  </div>
</footer>
