<header class="bg-white">
  <div class="container-wide flex items-center justify-between py-5">
    <a href="{{ "/" | relLangURL }}" class="text-[1.375rem] font-bold text-ink tracking-[-0.02em] hover:text-ink">
      Flonam
    </a>
    <nav aria-label="Hoofdmenu" class="hidden md:block">
      <ul class="flex items-center gap-8">
        {{ range .Site.Menus.main }}
          {{ $isCta := eq .Name "Contact" }}
          <li>
            {{ if $isCta }}
              <a href="{{ .URL | relLangURL }}" class="btn-pill-green">{{ .Name }}</a>
            {{ else }}
              <a href="{{ .URL | relLangURL }}" class="text-[0.9375rem] font-medium text-muted hover:text-green-700 transition-colors">{{ .Name }}</a>
            {{ end }}
          </li>
        {{ end }}
      </ul>
    </nav>
  </div>
</header>
