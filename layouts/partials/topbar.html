{{ with .Site.Params.contact }}
<div class="bg-green-900 text-white/85 text-[0.8125rem]">
  <div class="container-wide flex flex-wrap items-center justify-between gap-x-6 gap-y-2 py-2.5">
    <div class="flex flex-wrap items-center gap-x-6 gap-y-1.5">
      {{ with .address }}
        <span class="inline-flex items-center gap-2">
          <svg aria-hidden="true" class="size-3.5 text-green-400 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          {{ . }}
        </span>
      {{ end }}
      {{ with .phone }}
        <a href="tel:{{ $.Site.Params.contact.phone_link }}" class="inline-flex items-center gap-2 hover:text-white transition-colors">
          <svg aria-hidden="true" class="size-3.5 text-green-400 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          {{ . }}
        </a>
      {{ end }}
    </div>
    <div class="flex items-center gap-x-6">
      {{ with .email }}
        <a href="mailto:{{ . }}" class="inline-flex items-center gap-2 hover:text-white transition-colors">
          <svg aria-hidden="true" class="size-3.5 text-green-400 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          {{ . }}
        </a>
      {{ end }}
    </div>
  </div>
</div>
{{ end }}
