{{ define "main" }}
<article class="container-narrow py-16">
  <header class="mb-10">
    <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight">{{ .Title }}</h1>
    {{ with .Description }}<p class="mt-3 text-lg text-muted">{{ . }}</p>{{ end }}
  </header>
  <div class="prose prose-slate max-w-none">
    {{ .Content }}
  </div>
</article>
{{ end }}
