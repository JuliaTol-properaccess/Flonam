<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}" />

  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

  {{ $css := resources.Get "css/style.css" }}
  {{ if $css }}
    {{ $css = $css | fingerprint }}
    <link rel="stylesheet" href="{{ $css.RelPermalink }}" />
  {{ end }}

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" />

  {{ with .OutputFormats.Get "RSS" }}
    <link rel="alternate" type="application/rss+xml" href="{{ .Permalink }}" title="{{ $.Site.Title }}" />
  {{ end }}
</head>
<body class="min-h-screen flex flex-col">
  <a href="#main" class="sr-only focus:not-sr-only focus:absolute focus:top-0 focus:left-4 focus:z-50 focus:bg-purple-700 focus:text-white focus:px-6 focus:py-3 focus:rounded-b-md focus:font-bold">Ga naar inhoud</a>
  {{ partial "header.html" . }}
  <main id="main" class="flex-1">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
</body>
</html>
