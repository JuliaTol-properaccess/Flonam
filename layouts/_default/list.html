{{ define "main" }}
<section class="container-wide py-16">
  <header class="mb-10">
    <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight">{{ .Title }}</h1>
    {{ with .Description }}<p class="mt-3 text-lg text-muted">{{ . }}</p>{{ end }}
  </header>

  {{ with .Content }}
    <div class="prose prose-slate max-w-none mb-12">{{ . }}</div>
  {{ end }}

  {{ if .Pages }}
    <ul class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
      {{ range .Pages }}
        <li class="rounded-lg border border-slate-200 p-6 hover:shadow-md transition-shadow">
          <h2 class="font-display text-xl font-bold">
            <a href="{{ .RelPermalink }}" class="text-ink hover:text-brand">{{ .Title }}</a>
          </h2>
          {{ with .Description }}<p class="mt-2 text-sm text-muted">{{ . }}</p>{{ end }}
        </li>
      {{ end }}
    </ul>
  {{ end }}
</section>
{{ end }}
