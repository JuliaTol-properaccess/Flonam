baseURL = "https://flonam.nl/"
title = "Flonam"
languageCode = "nl"
defaultContentLanguage = "nl"
defaultContentLanguageInSubdir = false
timeZone = "Europe/Amsterdam"

[languages]
  [languages.nl]
    languageName = "Nederlands"
    weight = 1
    contentDir = "content/nl"

[pagination]
  pagerSize = 12

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

[build]
  [build.buildStats]
    enable = true
  [[build.cachebusters]]
    source = 'assets/notwatching/hugo_stats\.json'
    target = 'css'

[module]
  [[module.mounts]]
    source = 'assets'
    target = 'assets'
  [[module.mounts]]
    disableWatch = true
    source = 'hugo_stats.json'
    target = 'assets/notwatching/hugo_stats.json'

[outputs]
  home = ["HTML", "RSS"]

[params]
  description = "SaaS-tools voor B2B-teams die efficiënter willen werken en processen willen versnellen. Gebouwd op ervaring in digitale toegankelijkheid."
  author = "Flonam"
  logoText = "Flonam"

  [params.contact]
    email = "info@flonam.nl"
    phone = "085 123 4567"
    phone_link = "+31851234567"
    address = "Voorbeeldstraat 1, 1234 AB Amsterdam"

[menus]
  [[menus.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menus.main]]
    name = "Over ons"
    url = "/over/"
    weight = 2
  [[menus.main]]
    name = "Diensten"
    url = "/diensten/"
    weight = 3
  [[menus.main]]
    name = "Contact"
    url = "/contact/"
    weight = 4

[sitemap]
  changefreq = "monthly"
  filename = "sitemap.xml"
  priority = 0.5
